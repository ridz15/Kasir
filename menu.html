<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menu moncake94</title>
    <link rel="icon" type="image/png" href="public/mooncake94.png" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #f5f0e8;
        color: #2d211a;
        font-family: Arial, sans-serif;
      }

      main {
        width: min(100%, 980px);
        margin: 0 auto;
        padding: 16px;
      }

      img {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 18px;
        box-shadow: 0 18px 40px rgba(45, 33, 26, 0.14);
      }

      @media (max-width: 640px) {
        main {
          padding: 0;
        }

        img {
          border-radius: 0;
          box-shadow: none;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <img src="public/menu.png" alt="Menu moncake94" />
    </main>
  </body>
</html>
